<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LendSynthetix – Loan War Room</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
.page { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem; }
.top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
.top-bar h1 { font-size: 20px; font-weight: 500; }
.top-bar .sub { font-size: 13px; color: #888780; margin-top: 3px; max-width: 600px; line-height: 1.4; }
.refresh-btn { background: #1a1a18; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.refresh-btn:hover { background: #2c2c2a; }
.refresh-btn:disabled { background: #b4b2a9; cursor: default; }
.status-bar { font-size: 12px; color: #888780; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #639922; }
.status-dot.loading { background: #ba7517; animation: pulse 1s infinite; }
.status-dot.error { background: #e24b4a; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.verdict-banner { border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; border: 1px solid; }
.verdict-approve     { background: #eaf3de; border-color: #c0dd97; }
.verdict-reject      { background: #fcebeb; border-color: #f7c1c1; }
.verdict-conditional { background: #faeeda; border-color: #fac775; }
.verdict-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.verdict-approve .verdict-label     { color: #3b6d11; }
.verdict-reject .verdict-label      { color: #a32d2d; }
.verdict-conditional .verdict-label { color: #854f0b; }
.verdict-title { font-size: 24px; font-weight: 500; }
.verdict-approve .verdict-title     { color: #3b6d11; }
.verdict-reject .verdict-title      { color: #a32d2d; }
.verdict-conditional .verdict-title { color: #854f0b; }
.verdict-reasoning { font-size: 14px; line-height: 1.6; color: #5f5e5a; margin-top: 8px; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric-card { background: #fff; border-radius: 8px; padding: 0.875rem 1rem; border: 1px solid #e8e6df; }
.metric-label { font-size: 12px; color: #888780; margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; color: #1a1a18; }
.metric-sub { font-size: 12px; color: #b4b2a9; margin-top: 2px; }
.section { margin-bottom: 1.5rem; }
.section-title { font-size: 12px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
.agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
.agent-card { background: #fff; border: 1px solid #e8e6df; border-radius: 12px; padding: 1rem 1.25rem; }
.agent-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.agent-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.agent-name { font-size: 13px; font-weight: 500; color: #1a1a18; }
.agent-role { font-size: 11px; color: #888780; }
.agent-summary { font-size: 13px; color: #5f5e5a; line-height: 1.5; }
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; margin-top: 8px; }
.badge-approve { background: #eaf3de; color: #3b6d11; }
.badge-reject  { background: #fcebeb; color: #a32d2d; }
.badge-warn    { background: #faeeda; color: #854f0b; }
.two-col { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.panel { background: #fff; border: 1px solid #e8e6df; border-radius: 12px; padding: 1rem 1.25rem; }
.panel-title { font-size: 13px; font-weight: 500; color: #1a1a18; margin-bottom: 12px; }
.driver-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f1efe8; }
.driver-item:last-child { border-bottom: none; }
.driver-name { color: #5f5e5a; flex: 1; padding-right: 8px; }
.driver-pos { font-weight: 500; color: #3b6d11; }
.driver-neg { font-weight: 500; color: #a32d2d; }
.driver-neu { font-weight: 500; color: #888780; }
.conditions-list { list-style: none; }
.conditions-list li { font-size: 13px; color: #5f5e5a; padding: 7px 0; border-bottom: 1px solid #f1efe8; display: flex; gap: 8px; line-height: 1.5; }
.conditions-list li:last-child { border-bottom: none; }
.cond-num { font-size: 11px; font-weight: 600; color: #854f0b; min-width: 18px; margin-top: 1px; flex-shrink: 0; }
.stress-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stress-table th { text-align: left; font-weight: 500; font-size: 12px; color: #888780; padding: 8px 12px; border-bottom: 1px solid #e8e6df; }
.stress-table td { padding: 9px 12px; border-bottom: 1px solid #f1efe8; color: #1a1a18; }
.stress-table tr:last-child td { border-bottom: none; }
.stress-table tr:hover td { background: #f8f7f4; }
.bar-wrap { display: flex; align-items: center; gap: 8px; }
.bar-bg { flex: 1; height: 6px; background: #f1efe8; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.memo-tabs { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
.tab-btn { background: #fff; border: 1px solid #e8e6df; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #5f5e5a; }
.tab-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.memo-block { background: #fff; border: 1px solid #e8e6df; border-radius: 12px; padding: 1rem 1.25rem; }
.memo-field { margin-bottom: 10px; }
.memo-field:last-child { margin-bottom: 0; }
.memo-field-label { font-size: 11px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.memo-field-value { font-size: 13px; color: #1a1a18; line-height: 1.5; }
.memo-list { list-style: none; }
.memo-list li { font-size: 13px; color: #5f5e5a; padding: 4px 0; border-bottom: 1px solid #f1efe8; display: flex; gap: 6px; }
.memo-list li:last-child { border-bottom: none; }
.error-box { background: #fcebeb; border: 1px solid #f7c1c1; border-radius: 12px; padding: 1.5rem; font-size: 14px; color: #a32d2d; line-height: 1.7; }
.error-box code { background: #f7c1c1; padding: 1px 6px; border-radius: 4px; font-size: 13px; }
@media (max-width: 600px) {
  .page { padding: 1rem; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <h1>LendSynthetix — Loan War Room</h1>
      <p class="sub" id="question-text">Loading...</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Fetching results...</span>
  </div>
  <div id="root"><div style="text-align:center;padding:4rem 0;color:#888780;font-size:14px;">Loading...</div></div>
</div>

<script>
function getRiskColor(l){return l==="LOW"?{bar:"#639922",text:"#3b6d11"}:l==="HIGH"?{bar:"#e24b4a",text:"#a32d2d"}:{bar:"#ba7517",text:"#854f0b"}}
function getVerdictClass(r){if(!r)return"verdict-conditional";const u=r.toUpperCase();return u==="APPROVE"?"verdict-approve":u==="REJECT"?"verdict-reject":"verdict-conditional"}
function getVerdictLabel(r){if(!r)return"Decision pending";const u=r.toUpperCase();return u==="APPROVE"?"Approved":u==="REJECT"?"Rejected":"Conditional Approval"}
function parseDriverScore(d){const m=d.match(/([+-]\d+)/);return m?parseInt(m[1]):0}
function badgeForRec(r){if(!r)return"";const u=r.toUpperCase();return u==="APPROVE"?`<span class="badge badge-approve">Approve</span>`:u.includes("REJECT")?`<span class="badge badge-reject">Reject</span>`:`<span class="badge badge-warn">${r}</span>`}
function memoList(arr){if(!arr||!arr.length)return`<p style="font-size:13px;color:#888780">None</p>`;return`<ul class="memo-list">${arr.map(i=>`<li><span style="color:#b4b2a9">•</span>${i}</li>`).join("")}</ul>`}
function memoField(label,value){if(value===undefined||value===null||value==="")return"";return`<div class="memo-field"><div class="memo-field-label">${label}</div><div class="memo-field-value">${value}</div></div>`}

function renderMemoBlock(memo){
  if(!memo||!Object.keys(memo).length)return`<div class="memo-block"><p style="font-size:13px;color:#888780;text-align:center;padding:1rem">No memo available.</p></div>`;
  const skip=["recommendation","summary"];
  return`<div class="memo-block">
    ${memoField("Recommendation",badgeForRec(memo.recommendation))}
    ${memoField("Summary",memo.summary)}
    ${Object.entries(memo).filter(([k])=>!skip.includes(k)).map(([k,v])=>{
      const label=k.replace(/_/g," ");
      if(Array.isArray(v))return`<div class="memo-field"><div class="memo-field-label">${label}</div>${memoList(v)}</div>`;
      return memoField(label,v);
    }).join("")}
  </div>`;
}

function setStatus(type,text){
  const dot=document.getElementById("status-dot");
  dot.className="status-dot"+(type==="loading"?" loading":type==="error"?" error":"");
  document.getElementById("status-text").textContent=text;
}

function switchTab(i){
  document.querySelectorAll(".tab-btn").forEach((b,j)=>b.classList.toggle("active",j===i));
  document.querySelectorAll(".tab-content").forEach((c,j)=>c.classList.toggle("active",j===i));
}

function render(data){
  const fd=data.final_decision||{};
  const rs=data.risk_score||{};
  const fa=(data.financial_analysis||{}).metrics||data.financial_analysis||{};
  const stress=data.stress_test_results||{};
  const rec=fd.final_recommendation||"";

  document.getElementById("question-text").textContent=data.question||"Commercial loan evaluation";

  const score=rs.risk_score||0;
  const level=rs.risk_level||"MEDIUM";
  const drivers=rs.key_drivers||[];
  const conditions=fd.conditions||[];

  const metricCards=[
    {label:"Risk score",    value:score,                                                             sub:level},
    {label:"DSCR",          value:fa.dscr||"—",                                                     sub:"debt service"},
    {label:"Revenue growth",value:fa.revenue_growth||"—",                                           sub:"year on year"},
    {label:"Loan amount",   value:fa.loan_amnt?"$"+Number(fa.loan_amnt).toLocaleString():"—",       sub:"requested"},
    {label:"Interest rate", value:fa.loan_int_rate?fa.loan_int_rate+"%":"—",                        sub:"annual"},
    {label:"Debt trend",    value:fa.debt_trend||"—",                                               sub:"trajectory"},
  ].map(m=>`<div class="metric-card"><div class="metric-label">${m.label}</div><div class="metric-value">${m.value}</div><div class="metric-sub">${m.sub}</div></div>`).join("");

  const agents=[
    {initials:"RM",bg:"#e6f1fb",color:"#0c447c",name:"Relationship Manager",role:"Sales Agent",     memo:data.sales_memo},
    {initials:"CU",bg:"#eaf3de",color:"#27500a",name:"Credit Underwriter",  role:"Risk Agent",      memo:data.risk_memo},
    {initials:"CO",bg:"#faece7",color:"#712b13", name:"Compliance Officer",  role:"Compliance Agent",memo:data.compliance_memo},
  ].map(a=>`<div class="agent-card">
    <div class="agent-header">
      <div class="agent-avatar" style="background:${a.bg};color:${a.color};">${a.initials}</div>
      <div><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
    </div>
    <div class="agent-summary">${(a.memo||{}).summary||"No memo available."}</div>
    ${badgeForRec((a.memo||{}).recommendation)}
  </div>`).join("");

  const driverRows=drivers.map(d=>{
    const sc=parseDriverScore(d);
    const cls=sc>0?"driver-pos":sc<0?"driver-neg":"driver-neu";
    return`<div class="driver-item"><span class="driver-name">${d.replace(/\([+-]?\d+\)/,"").trim()}</span><span class="${cls}">${sc!==0?(sc>0?"+":"")+sc:"—"}</span></div>`;
  }).join("");

  const condRows=conditions.map((c,i)=>`<li><span class="cond-num">${i+1}.</span>${c}</li>`).join("");

  const stressRows=Object.entries(stress).map(([name,result])=>{
    const sc=result.risk_score||0;
    const lv=result.risk_level||"MEDIUM";
    const c=getRiskColor(lv);
    return`<tr><td>${name}</td><td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${sc}%;background:${c.bar};"></div></div><span style="min-width:28px;font-weight:500;color:${c.text}">${sc}</span></div></td><td style="color:${c.text};font-weight:500;">${lv}</td></tr>`;
  }).join("");

  const memoLabels=["Sales memo","Risk memo","Compliance memo","Sales rebuttal"];
  const memoData=[data.sales_memo,data.risk_memo,data.compliance_memo,data.sales_rebuttal];
  const memoTabs=memoLabels.map((l,i)=>`<button class="tab-btn${i===0?" active":""}" onclick="switchTab(${i})">${l}</button>`).join("");
  const memoContents=memoData.map((m,i)=>`<div class="tab-content${i===0?" active":""}" id="tab-${i}">${renderMemoBlock(m)}</div>`).join("");

  document.getElementById("root").innerHTML=`
    <div class="verdict-banner ${getVerdictClass(rec)}">
      <div class="verdict-label">Final decision</div>
      <div class="verdict-title">${getVerdictLabel(rec)}</div>
      <div class="verdict-reasoning">${fd.reasoning||"No reasoning provided."}</div>
    </div>
    <div class="metrics-grid">${metricCards}</div>
    <div class="section"><div class="section-title">Agent summaries</div><div class="agents-grid">${agents}</div></div>
    <div class="section">
      <div class="section-title">Full agent memos</div>
      <div class="memo-tabs">${memoTabs}</div>
      ${memoContents}
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">Risk score drivers</div>
        ${driverRows||"<p style='font-size:13px;color:#888780'>No drivers available.</p>"}
      </div>
      ${conditions.length>0?`<div class="panel"><div class="panel-title">Approval conditions</div><ul class="conditions-list">${condRows}</ul></div>`:""}
    </div>
    <div class="section">
      <div class="section-title">Stress test scenarios</div>
      <div class="panel" style="padding:0.25rem 0;">
        <table class="stress-table">
          <thead><tr><th>Scenario</th><th>Risk score</th><th>Level</th></tr></thead>
          <tbody>${stressRows||"<tr><td colspan='3' style='text-align:center;color:#888780;padding:1rem'>No results.</td></tr>"}</tbody>
        </table>
      </div>
    </div>`;
}

function loadData(){
  const btn=document.getElementById("refresh-btn");
  btn.disabled=true; btn.textContent="Loading...";
  setStatus("loading","Fetching war_room_output.json...");
  fetch("war_room_output.json?t="+Date.now())
    .then(r=>{if(!r.ok)throw new Error("war_room_output.json not found — run war_room_test.py first.");return r.json();})
    .then(data=>{render(data);setStatus("ok","Last updated: "+new Date().toLocaleTimeString());})
    .catch(err=>{
      setStatus("error",err.message);
      document.getElementById("root").innerHTML=`<div class="error-box"><strong>Could not load war_room_output.json</strong><br><br>
        1. Run <code>python war_room_test.py</code> to generate the output<br>
        2. Serve this folder: <code>python -m http.server 8000</code><br>
        3. Open <code>http://localhost:8000/war_room_ui.html</code></div>`;
    })
    .finally(()=>{btn.disabled=false;btn.textContent="Refresh";});
}

loadData();
</script>
</body>
</html>
